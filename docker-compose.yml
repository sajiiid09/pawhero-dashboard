# Development/demo compose only. Production should run migrations as a release step,
# must not auto-seed, and must run the scheduler in exactly one backend process.
services:
  postgres:
    image: postgres:17
    container_name: pawhero-postgres
    environment:
      POSTGRES_DB: pawhero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pawhero_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pawhero"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pawhero-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/pawhero
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      APP_URL: http://localhost:3000
      DB_POOL_MODE: session
      SCHEDULER_ENABLED: "true"
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run python -m app.db.seed &&
      uv run fastapi run app/main.py --host 0.0.0.0 --port 8000"

  frontend:
    image: node:22-bookworm-slim
    container_name: pawhero-frontend
    working_dir: /workspace
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    command: >
      sh -c "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --dir frontend dev --hostname 0.0.0.0 --port 3000"

volumes:
  pawhero_postgres_data:
