services:
  postgres:
    image: postgres:17
    container_name: pawhero-postgres
    environment:
      POSTGRES_DB: pawhero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pawhero_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pawhero"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pawhero_postgres_data:
